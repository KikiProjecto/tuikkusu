 <body data-template-id="__page-root" class="min-h-screen p-4" style="background: rgb(10, 10, 10);">

  <script src="/_sdk/ba7a87cbf0298387.editing_sdk.js" integrity="sha512-Tj5coTlt0zVGjhUTG6We0NjzvddIVl9nrFVeLejaQFP8g9Kb83FahoAtAQLehYaTUxeN5sV/r4RJs7ytEpNoVQ=="></script>
  <script>
        let allData = [];
        const listEl = document.getElementById('file-list');
        const emptyMsg = document.querySelector('[data-template-id="empty-msg"]');
        const storageInfo = document.getElementById('storage-info');
        const limitWarn = document.getElementById('limit-warning');

        const handler = {
            onDataChanged(data) {
                allData = data;
                emptyMsg.classList.toggle('hidden', data.length > 0);
                const totalKB = data.reduce((s, r) => s + (r.size_kb || 0), 0);
                storageInfo.textContent = `${data.length} items | ${totalKB.toLocaleString()} KB`;

                const existing = new Map([...listEl.querySelectorAll('[data-item-id]')].map(el => [el.dataset.itemId, el]));
                const ids = new Set(data.map(r => r.__backendId));

                data.forEach(record => {
                    const id = record.__backendId;
                    if (existing.has(id)) {
                        updateRow(existing.get(id), record);
                        existing.delete(id);
                    } else {
                        listEl.appendChild(createRow(record));
                    }
                });
                existing.forEach(el => el.remove());
            }
        };

        function createRow(record) {
            const tpl = document.getElementById('row-tpl');
            const el = tpl.content.cloneNode(true).firstElementChild;
            el.dataset.itemId = record.__backendId;
            updateRow(el, record);

            const delBtn = el.querySelector('.del-btn');
            const confirmBtn = el.querySelector('.confirm-btn');
            delBtn.addEventListener('click', () => { delBtn.classList.add('hidden'); confirmBtn.classList.remove('hidden'); });
            confirmBtn.addEventListener('click', async () => {
                confirmBtn.textContent = '[...]';
                const res = await window.dataSdk.delete(record);
                if (!res.isOk) { confirmBtn.textContent = '[err]'; }
            });
            return el;
        }

        function updateRow(el, record) {
            const icon = record.type === 'folder' ? '📁' : '📄';
            el.querySelector('.file-info').textContent = `${icon} ${record.parent_path}${record.name}`;
            el.querySelector('.file-size').textContent = record.type === 'folder' ? 'DIR' : `${record.size_kb}KB`;
        }

        document.getElementById('add-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (allData.length >= 999) { limitWarn.classList.remove('hidden'); return; }
            const btn = document.querySelector('[data-template-id="btn-add"]');
            btn.disabled = true; btn.textContent = '...';
            const res = await window.dataSdk.create({
                name: document.getElementById('inp-name').value,
                type: document.getElementById('inp-type').value,
                size_kb: Number(document.getElementById('inp-size').value) || 0,
                parent_path: document.getElementById('inp-path').value || '/',
                created_at: new Date().toISOString()
            });
            btn.disabled = false; btn.textContent = '$ create';
            if (res.isOk) { document.getElementById('inp-name').value = ''; }
        });

        (async () => {
            const r = await window.dataSdk.init(handler);
            if (!r.isOk) console.error('SDK init failed');
        })();
    </script>
